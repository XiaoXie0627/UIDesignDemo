<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米澎湃OS - 深度优化版</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 动态背景 -->
    <div class="bg-container">
        <div class="bg-gradient"></div>
        <div class="wave-effects">
            <div class="wave wave-1"></div>
            <div class="wave wave-2"></div>
            <div class="wave wave-3"></div>
        </div>
    </div>

    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <span>MI</span>
                    </div>
                    <span class="logo-text">澎湃OS</span>
                </div>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <div class="nav-icon-wrap">
                        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                            <rect x="2" y="2" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
                            <rect x="12" y="2" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
                            <rect x="2" y="12" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
                            <rect x="12" y="12" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <span>首页</span>
                </a>
                <a href="#" class="nav-item">
                    <div class="nav-icon-wrap">
                        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                            <path d="M3 17V11M7 17V7M11 17V13M15 17V9M19 17V5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span>数据</span>
                </a>
                <a href="#" class="nav-item">
                    <div class="nav-icon-wrap">
                        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                            <circle cx="11" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M4 20C4 16.6863 7.13401 14 11 14C14.866 14 18 16.6863 18 20" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <span>用户</span>
                </a>
                <a href="#" class="nav-item">
                    <div class="nav-icon-wrap">
                        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                            <circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M11 2V4M11 18V20M2 11H4M18 11H20M4.93 4.93L6.34 6.34M15.66 15.66L17.07 17.07M17.07 4.93L15.66 6.34M6.34 15.66L4.93 17.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span>设置</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-card glass-inset">
                    <div class="user-avatar">
                        <span>J</span>
                        <span class="online-dot"></span>
                    </div>
                    <div class="user-info">
                        <span class="user-name">John</span>
                        <span class="user-role">管理员</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="top-bar glass">
                <div class="top-bar-left">
                    <h1 class="page-title">仪表盘</h1>
                    <span class="page-subtitle">欢迎回来，John</span>
                </div>
                <div class="top-bar-right">
                    <div class="search-container glass-inset">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M12 12L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <input type="text" placeholder="搜索..." class="search-input">
                    </div>
                    <button class="icon-button glass-btn notification-btn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 2C7.23858 2 5 4.23858 5 7V11L3 14H17L15 11V7C15 4.23858 12.7614 2 10 2Z" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M8 14V15C8 16.1046 8.89543 17 10 17C11.1046 17 12 16.1046 12 15V14" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <span class="notification-badge">3</span>
                    </button>
                </div>
            </header>

            <!-- 控制中心 -->
            <section class="control-center glass">
                <div class="control-header">
                    <h3>控制中心</h3>
                    <span class="control-status">已连接 6 个设备</span>
                </div>
                <div class="control-grid">
                    <button class="control-btn active glass-btn">
                        <span class="control-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path d="M1 6L12 1L23 6V18L12 23L1 18V6Z" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M12 12L23 6M12 12L1 6M12 12V23" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </span>
                        <span>WiFi</span>
                    </button>
                    <button class="control-btn glass-btn">
                        <span class="control-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M16.24 7.76C18.18 9.7 18.18 12.83 16.24 14.77" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M7.76 16.24C5.82 14.3 5.82 11.17 7.76 9.23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M19.07 4.93C22.02 7.88 22.02 12.65 19.07 15.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M4.93 19.07C1.98 16.12 1.98 11.35 4.93 8.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <span>蓝牙</span>
                    </button>
                    <button class="control-btn active glass-btn">
                        <span class="control-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path d="M11 5L6 9H2V15H6L11 19V5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M15.54 8.46C16.48 9.4 17.05 10.65 17.05 12C17.05 13.35 16.48 14.6 15.54 15.54" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <span>静音</span>
                    </button>
                    <button class="control-btn glass-btn">
                        <span class="control-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path d="M4 12V21H20V12" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M12 3V21M12 3L8 7M12 3L16 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <span>旋转</span>
                    </button>
                    <button class="control-btn active glass-btn">
                        <span class="control-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M12 2V4M12 20V20M2 12H4M20 12H22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <span>护眼</span>
                    </button>
                    <button class="control-btn glass-btn">
                        <span class="control-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <span>飞行</span>
                    </button>
                </div>
            </section>

            <!-- 统计卡片 -->
            <section class="stats-row">
                <div class="stat-card glass">
                    <div class="stat-card-inner">
                        <div class="stat-icon income">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path d="M12 2V22M17 5H9.5C8.57174 5 7.6815 5.36875 7.02513 6.02513C6.36875 6.6815 6 7.57174 6 8.5C6 9.42826 6.36875 10.3185 7.02513 10.9749C7.6815 11.6313 8.57174 12 9.5 12H14.5C15.4283 12 16.3185 12.3687 16.9749 13.0251C17.6313 13.6815 18 14.5717 18 15.5C18 16.4283 17.6313 17.3185 16.9749 17.9749C16.3185 18.6313 15.4283 19 14.5 19H6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <div class="stat-details">
                            <span class="stat-value">¥128,450</span>
                            <span class="stat-label">总收入</span>
                        </div>
                        <div class="stat-trend up">+12.5%</div>
                    </div>
                    <div class="stat-sparkline">
                        <svg width="100%" height="32" viewBox="0 0 120 32" preserveAspectRatio="none">
                            <path d="M0 24 Q15 20, 30 22 T60 18 T90 14 T120 8" stroke="url(#mi-spark-1)" stroke-width="2" fill="none"/>
                            <defs>
                                <linearGradient id="mi-spark-1" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#ff6a00"/>
                                    <stop offset="100%" stop-color="#ff9500"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>

                <div class="stat-card glass">
                    <div class="stat-card-inner">
                        <div class="stat-icon users">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M3 21V19C3 16.7909 4.79086 15 7 15H11C13.2091 15 15 16.7909 15 19V21" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </div>
                        <div class="stat-details">
                            <span class="stat-value">24,521</span>
                            <span class="stat-label">活跃用户</span>
                        </div>
                        <div class="stat-trend up">+8.2%</div>
                    </div>
                    <div class="stat-sparkline">
                        <svg width="100%" height="32" viewBox="0 0 120 32" preserveAspectRatio="none">
                            <path d="M0 20 Q20 18, 40 16 T80 12 T120 10" stroke="url(#mi-spark-2)" stroke-width="2" fill="none"/>
                            <defs>
                                <linearGradient id="mi-spark-2" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#4ade80"/>
                                    <stop offset="100%" stop-color="#22c55e"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>

                <div class="stat-card glass">
                    <div class="stat-card-inner">
                        <div class="stat-icon orders">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M3 9H21" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </div>
                        <div class="stat-details">
                            <span class="stat-value">1,845</span>
                            <span class="stat-label">订单数量</span>
                        </div>
                        <div class="stat-trend down">-2.4%</div>
                    </div>
                    <div class="stat-sparkline">
                        <svg width="100%" height="32" viewBox="0 0 120 32" preserveAspectRatio="none">
                            <path d="M0 12 Q25 14, 50 18 T100 22 T120 24" stroke="url(#mi-spark-3)" stroke-width="2" fill="none"/>
                            <defs>
                                <linearGradient id="mi-spark-3" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#f87171"/>
                                    <stop offset="100%" stop-color="#ef4444"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>

                <div class="stat-card glass">
                    <div class="stat-card-inner">
                        <div class="stat-icon satisfaction">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M8 14C8 14 9.5 16 12 16C14.5 16 16 14 16 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                <circle cx="9" cy="10" r="1" fill="currentColor"/>
                                <circle cx="15" cy="10" r="1" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="stat-details">
                            <span class="stat-value">94.2%</span>
                            <span class="stat-label">满意度</span>
                        </div>
                        <div class="stat-trend up">+1.8%</div>
                    </div>
                    <div class="stat-progress">
                        <div class="progress-ring">
                            <svg width="48" height="48" viewBox="0 0 48 48">
                                <circle cx="24" cy="24" r="20" stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="none"/>
                                <circle cx="24" cy="24" r="20" stroke="url(#mi-progress)" stroke-width="4" fill="none" 
                                    stroke-dasharray="125.6" stroke-dashoffset="10" stroke-linecap="round" transform="rotate(-90 24 24)"/>
                                <defs>
                                    <linearGradient id="mi-progress" x1="0%" y1="0%" x2="100%" y2="0%">
                                        <stop offset="0%" stop-color="#4ade80"/>
                                        <stop offset="100%" stop-color="#22c55e"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                            <span class="progress-value">94%</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 主要内容区 -->
            <section class="content-area">
                <!-- 快捷功能 -->
                <div class="card glass quick-actions-card">
                    <div class="card-header">
                        <h3>快捷功能</h3>
                    </div>
                    <div class="quick-actions-grid">
                        <button class="quick-action glass-inset">
                            <div class="action-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span>新建</span>
                        </button>
                        <button class="quick-action glass-inset">
                            <div class="action-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M21 15V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    <path d="M7 10L12 15L17 10M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <span>导出</span>
                        </button>
                        <button class="quick-action glass-inset">
                            <div class="action-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M9 17H15M9 13H15M9 9H12M5 3H19C20.1046 3 21 3.89543 21 5V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span>报表</span>
                        </button>
                        <button class="quick-action glass-inset">
                            <div class="action-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                                    <path d="M12 2V4M12 20V22M2 12H4M20 12H22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <span>设置</span>
                        </button>
                    </div>
                </div>

                <!-- 最近活动 -->
                <div class="card glass activity-card">
                    <div class="card-header">
                        <h3>最近活动</h3>
                        <button class="view-all-btn">查看全部</button>
                    </div>
                    <div class="activity-list">
                        <div class="activity-item glass-inset">
                            <div class="activity-icon create">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                    <path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </div>
                            <div class="activity-content">
                                <span class="activity-title">新建项目「移动端改版」</span>
                                <span class="activity-meta">5分钟前 · Alice</span>
                            </div>
                        </div>
                        <div class="activity-item glass-inset">
                            <div class="activity-icon approve">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                    <path d="M3 8L6 11L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <div class="activity-content">
                                <span class="activity-title">审批通过「Q3预算」</span>
                                <span class="activity-meta">10分钟前 · Bob</span>
                            </div>
                        </div>
                        <div class="activity-item glass-inset">
                            <div class="activity-icon message">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                    <path d="M2 4L8 8L14 4V12L8 16L2 12V4Z" stroke="currentColor" stroke-width="1.5"/>
                                </svg>
                            </div>
                            <div class="activity-content">
                                <span class="activity-title">收到来自Carol的消息</span>
                                <span class="activity-meta">15分钟前 · Carol</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 团队成员 -->
                <div class="card glass team-card">
                    <div class="card-header">
                        <h3>团队成员</h3>
                        <span class="member-count">在线 6人</span>
                    </div>
                    <div class="team-grid">
                        <div class="team-member glass-inset">
                            <div class="member-avatar" style="background: linear-gradient(135deg, #ff6a00, #ff9500);">
                                <span>A</span>
                                <span class="status-indicator online"></span>
                            </div>
                            <span class="member-name">Alice</span>
                        </div>
                        <div class="team-member glass-inset">
                            <div class="member-avatar" style="background: linear-gradient(135deg, #4ade80, #22c55e);">
                                <span>B</span>
                                <span class="status-indicator online"></span>
                            </div>
                            <span class="member-name">Bob</span>
                        </div>
                        <div class="team-member glass-inset">
                            <div class="member-avatar" style="background: linear-gradient(135deg, #60a5fa, #3b82f6);">
                                <span>C</span>
                                <span class="status-indicator away"></span>
                            </div>
                            <span class="member-name">Carol</span>
                        </div>
                        <div class="team-member glass-inset">
                            <div class="member-avatar" style="background: linear-gradient(135deg, #f472b6, #ec4899);">
                                <span>D</span>
                                <span class="status-indicator offline"></span>
                            </div>
                            <span class="member-name">David</span>
                        </div>
                    </div>
                </div>

                <!-- 设置卡片 -->
                <div class="card glass settings-card">
                    <div class="card-header">
                        <h3>系统设置</h3>
                    </div>
                    <div class="settings-list">
                        <div class="setting-item">
                            <div class="setting-info">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                    <path d="M10 2C7.23858 2 5 4.23858 5 7V11L3 14H17L15 11V7C15 4.23858 12.7614 2 10 2Z" stroke="currentColor" stroke-width="1.5"/>
                                </svg>
                                <span>通知提醒</span>
                            </div>
                            <label class="toggle">
                                <input type="checkbox" checked>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <div class="setting-info">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                    <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/>
                                    <path d="M10 2V4M10 16V18M2 10H4M16 10H18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                </svg>
                                <span>深色模式</span>
                            </div>
                            <label class="toggle">
                                <input type="checkbox">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 按钮展示 -->
            <section class="button-showcase glass">
                <h3>按钮样式</h3>
                <div class="button-group">
                    <button class="mi-btn primary">主要按钮</button>
                    <button class="mi-btn secondary glass-btn">次要按钮</button>
                    <button class="mi-btn ghost">幽灵按钮</button>
                    <button class="mi-btn text">文字按钮</button>
                    <button class="mi-btn" disabled>禁用按钮</button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
